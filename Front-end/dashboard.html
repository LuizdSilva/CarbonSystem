<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarbonTree Pro - Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Mantenha todo aquele seu CSS de :root, .card, .grid-cards e .charts-wrapper aqui */
        :root { --primary: #2d6a4f; --secondary: #40916c; --bg: #f8f9fa; --card-bg: #ffffff; --text: #1b4332; }
        body { font-family: 'Inter', system-ui, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .grid-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .valor { font-size: 2rem; font-weight: 800; color: var(--primary); }
        .charts-wrapper { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .chart-container { background: var(--card-bg); padding: 25px; border-radius: 20px; }
        @media (max-width: 768px) { .charts-wrapper { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="header">
    <h1>CarbonTree <span style="font-weight: 300;">System</span></h1>
    <a href="index.html" style="text-decoration: none; color: #666; font-size: 0.8rem;">Sair</a>
</div>

<div class="grid-cards">
    <div class="card">
        <h3>Emissão Hoje</h3>
        <div class="valor">14.2<span style="font-size: 1rem;"> kg</span></div>
    </div>
</div>

<div class="charts-wrapper">
    <div class="chart-container">
        <h2>Emissões Diárias (PPM)</h2>
        <canvas id="graficoDiario"></canvas>
    </div>
    <div class="chart-container">
        <h2>Evolução Semanal (kg CO2)</h2>
        <canvas id="graficoSemanal"></canvas>
    </div>
</div>

<script>
    // Coloque aqui o restante do seu código de carregarDados() e renderizarGraficos()
    // Aquele que você já tinha escrito no final do seu print!
</script>
</body>
</html>
